<!DOCTYPE html>
<html>
<head>
	<title>Schedule Manager</title>
	<link rel="stylesheet" href="style.css">
	<script src="Script.js"></script>

</head>
<body>

<h1>Schedule of the week</h1> <!-- I plan to eventually have a month schedule and then a year! -->
<form id="WF">

	<label for="Day">Day</label>
	<select id="Day" required>
	<option value="">Select day</option>

		<option>Monday</option>
		<option>Tuesday</option>
		<option>Wednesday</option>
		<option>Thursday</option>
		<option>Friday</option>
		<option>Saturday</option>
		<option>Sunday</option>
	</select>

	<label>Event name</label> <!-- Name of the event goes here, after more of my code is buildt i plan to swap this out for a searchable index of past event's too -->
	<input type="text" id="EN" name="Event Name" required>


	<label>Event starts at</label>
	<input type="time" id="ETS" name="Event Time" min="00:00" max="24:00" required>

	<label>Event ends at</label>
	<input type="time" id="ETE" name="Event Time" min="00:00" max="24:00">

	<label>Description of event</label><!-- Some event's need a little description, i plan to eventually hide this behind a button that way it looks nicer -->
	<textarea id="DE">Description of the event</textarea>

	<button>Add event</button>

</form>


<div class="Week"> <!-- A week Schedule, Going to use CSS grid to better customize and have a more flexable Schedule setup-->
	<div class="Day">Monday</div>
	<div class="Day">Tuesday</div>
	<div class="Day">Wednesday</div>
	<div class="Day">Thursday</div>
	<div class="Day">Friday</div>
	<div class="Day">Saturday</div>
	<div class="Day">Sunday</div>
	<div class="content"></div>
</div>

</body>
</html>
